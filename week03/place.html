<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="W03 Assignment: Country Page for WDD131 Dynamic Web Fundamentals">
    <meta name="author" content="Elías Rodríguez">

    <title>Country Page - Elías Rodríguez</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@400;500&display=swap">
    <link rel="stylesheet" href="styles/place.css">

    <script src="scripts/place.js" defer></script>
</head>
<body>
    <header>
        <h1>Japan</h1>
    </header>

    <main>

        <div class="hero">
            <picture>
                <source srcset="images/japan-large.webp" media="(min-width: 1000px)">
                <source srcset="images/japan-medium.webp" media="(min-width: 500px)">
                <img src="images/japan-small.webp" width="1500" height="1000" alt="Image of Kyoto City, Japan">
            </picture>
        </div>

        <div class="data">
            <h2>Data</h2>
            <p><strong>Area:</strong> 377.975km²</p>
            <p><strong>Population:</strong> 122.950.000</p>
            <p><strong>Capital:</strong> Tokyo</p>
            <p><strong>Languages:</strong> Japanese</p>
            <p><strong>Currency:</strong> Yen</p>
            <p><strong>Time Zone:</strong> UTC+9</p>
            <p><strong>Calling Code:</strong> +81</p>
            <p><strong>Internet TLD:</strong> .jp</p>
        </div>

        <div class="weather">
            <h2>Weather</h2>

            <p><strong>Temperature:</strong> <span id="temp"></span></p>
            <p><strong>Conditions:</strong> <span id="conditions"></span></p>
            <p><strong>Wind:</strong> <span id="wind"></span></p>
            <p><strong>Wind Chill:</strong> <span id="windChill"></span></p>
        </div>
    </main>

    <footer>
        <p>©<span id="currentYear"></span> | Elías Rodríguez | Uruguay</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
